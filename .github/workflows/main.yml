name: Build Eitherea APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Smart Build APK with Stacktrace
      run: |
        echo "Searching for Android project files..."
        FILE_PATH=$(find . -name "settings.gradle" | head -n 1)
        
        if [ -z "$FILE_PATH" ]; then
          echo "Error: settings.gradle nahi mila! Shayad files upload theek se nahi hui hain."
          exit 1
        fi
        
        PROJECT_ROOT=$(dirname $FILE_PATH)
        echo "Project root mil gaya yahan: $PROJECT_ROOT"
        cd $PROJECT_ROOT
        
        echo "Gradle wrapper ban raha hai..."
        gradle wrapper --gradle-version 8.1.0
        chmod +x ./gradlew
        
        echo "App build shuru ho raha hai (errors ko detail mein print karenge)..."
        ./gradlew assembleDebug --stacktrace
        
        echo "APK ko bahar laa rahe hain..."
        cp app/build/outputs/apk/debug/app-debug.apk $GITHUB_WORKSPACE/app-debug.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Eitherea-App
        path: app-debug.apk
