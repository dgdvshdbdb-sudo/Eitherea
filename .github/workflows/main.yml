name: Build Eitherea APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # Naya aur Sabse Zaroori Step: Force Gradle 8.4
    - name: Setup Gradle 8.4
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: 🧹 File Cleaner & Location Fixer
      run: |
        echo "Invisible characters saaf kar rahe hain..."
        find . -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.kt" \) -exec sed -i '1s/^\xef\xbb\xbf//' {} +
        
        echo "google-services.json ko verify kar rahe hain..."
        JSON_FILE=$(find . -name "google-services.json" | head -n 1)
        
        if [ -z "$JSON_FILE" ]; then
          echo "❌ ERROR: google-services.json nahi mili!"
          exit 1
        fi
        
        SETTINGS_PATH=$(find . -name "settings.gradle" | head -n 1)
        PROJECT_ROOT=$(dirname "$SETTINGS_PATH")
        DEST_PATH="$PROJECT_ROOT/app/google-services.json"
        
        if [ "$JSON_FILE" != "$DEST_PATH" ]; then
          mkdir -p "$PROJECT_ROOT/app"
          cp "$JSON_FILE" "$DEST_PATH"
          echo "✅ File ko move kar diya gaya hai."
        else
          echo "✅ File pehle se hi sahi jagah par hai!"
        fi

    - name: 🚀 Final Build
      run: |
        SETTINGS_PATH=$(find . -name "settings.gradle" | head -n 1)
        PROJECT_ROOT=$(dirname "$SETTINGS_PATH")
        cd "$PROJECT_ROOT"
        
        echo "APK build ho raha hai (Using Gradle 8.4)..."
        # Ab hum sidha 'gradle' command use kar sakte hain
        gradle assembleDebug --stacktrace
        
        cp app/build/outputs/apk/debug/app-debug.apk $GITHUB_WORKSPACE/Eitherea-Ready.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Eitherea-Final-App
        path: Eitherea-Ready.apk
