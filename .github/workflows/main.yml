name: Build Eitherea APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: 🧹 Magic File Cleaner (Invisible Character Fix)
      run: |
        echo "Windows PowerShell ke invisible characters (BOM) saaf kar rahe hain..."
        find . -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.kt" \) -exec sed -i '1s/^\xef\xbb\xbf//' {} +
        echo "Safai poori hui! Ab files ekdum clean hain."

    - name: Smart Build APK
      run: |
        echo "Searching for Android project files..."
        FILE_PATH=$(find . -name "settings.gradle" | head -n 1)
        
        if [ -z "$FILE_PATH" ]; then
          echo "❌ Error: settings.gradle nahi mila!"
          exit 1
        fi
        
        PROJECT_ROOT=$(dirname "$FILE_PATH")
        cd "$PROJECT_ROOT"
        
        # Check for google-services.json
        if [ ! -f "app/google-services.json" ]; then
          echo "❌ Error: google-services.json file tumhare 'app' folder ke andar nahi hai!"
          echo "👉 Please apni json file ko GitHub par EithereaApp/app/ folder mein upload karo."
          exit 1
        else
          echo "✅ Awesome! google-services.json is in the correct place."
        fi
        
        echo "Gradle wrapper ban raha hai..."
        gradle wrapper --gradle-version 8.1.0
        chmod +x ./gradlew
        
        echo "App build shuru ho raha hai..."
        ./gradlew assembleDebug --stacktrace
        
        echo "APK ko bahar laa rahe hain..."
        cp app/build/outputs/apk/debug/app-debug.apk $GITHUB_WORKSPACE/app-debug.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Eitherea-App
        path: app-debug.apk
