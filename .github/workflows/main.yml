name: Build Eitherea APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: 🧹 Magic Cleaner & File Fixer
      run: |
        echo "Invisible characters saaf kar rahe hain..."
        find . -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.kt" \) -exec sed -i '1s/^\xef\xbb\xbf//' {} +
        
        echo "google-services.json ko dhoondh kar sahi jagah set kar rahe hain..."
        # Pura repo search karo kisi bhi json ke liye jo google-services jaisa dikhta ho
        JSON_FILE=$(find . -name "google-services.json" | head -n 1)
        
        if [ -z "$JSON_FILE" ]; then
          echo "❌ ERROR: google-services.json abhi bhi nahi mili!"
          echo "Repo mein ye files hain:"
          find . -maxdepth 4 -not -path '*/.*'
          exit 1
        fi
        
        echo "✅ File mil gayi: $JSON_FILE"
        
        # Project root dhoondho jahan settings.gradle hai
        SETTINGS_PATH=$(find . -name "settings.gradle" | head -n 1)
        PROJECT_ROOT=$(dirname "$SETTINGS_PATH")
        
        # Agar app folder nahi hai toh banao aur file wahan move karo
        mkdir -p "$PROJECT_ROOT/app"
        cp "$JSON_FILE" "$PROJECT_ROOT/app/google-services.json"
        echo "✅ File ko $PROJECT_ROOT/app/ mein set kar diya hai."

    - name: 🚀 Build Eitherea App
      run: |
        SETTINGS_PATH=$(find . -name "settings.gradle" | head -n 1)
        PROJECT_ROOT=$(dirname "$SETTINGS_PATH")
        cd "$PROJECT_ROOT"
        
        echo "Gradle wrapper ban raha hai..."
        gradle wrapper --gradle-version 8.1.0
        chmod +x ./gradlew
        
        echo "Building APK..."
        ./gradlew assembleDebug --stacktrace
        
        cp app/build/outputs/apk/debug/app-debug.apk $GITHUB_WORKSPACE/Eitherea-v1.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Eitherea-App
        path: Eitherea-v1.apk
